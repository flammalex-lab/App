name: CI

# Blocking quality gate: lint + typecheck + tests must pass before
# anything merges to main. Runs in parallel to the (advisory) Claude
# review workflow.
#
# To make this a hard merge gate, enable branch protection in the repo
# settings → "Require status checks to pass before merging" and select
# the "lint", "typecheck", and "test" jobs.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm test -- --ci

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run build
        env:
          # next.config.js asserts NEXT_PUBLIC_SUPABASE_URL is set in
          # production builds (otherwise the image optimizer would silently
          # widen to *.supabase.co). The values below are dummies — the
          # build never reaches the network — but they have to be valid
          # URL / key strings so the runtime supabase clients can parse them.
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
          # src/lib/auth/impersonation-token.ts throws at module load if
          # NODE_ENV=production && !IMPERSONATION_SECRET. The build's page
          # data collection step imports every route, so this throws before
          # bundling completes. Provide a dummy — the build never signs or
          # verifies a real cookie.
          IMPERSONATION_SECRET: dummy-build-time-not-a-real-secret
