name: Claude PR review

# Sends every PR's diff to Claude via the Anthropic SDK for a structured
# review. Posts a comment on the PR, and fails the check if any finding
# is tagged severity=critical.
#
# Requires two repo secrets:
#   ANTHROPIC_API_KEY — https://console.anthropic.com/settings/keys
#   GITHUB_TOKEN      — auto-provided by Actions (no setup needed)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip on draft PRs and bot-authored PRs.
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/pr-review.mjs
