<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--surface); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .lab { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-tertiary); width: 160px; flex-shrink: 0; }
</style></head>
<body>
<div class="stack">
  <div class="row"><div class="lab">body · 16/400</div><p style="margin:0; max-width:520px">We vet every grower in the network. Decades of distribution means we know which farms ship on time and which ones don't.</p></div>
  <div class="row"><div class="lab">sm · 14/400 muted</div><small>Helper copy and supporting meta rows live here.</small></div>
  <div class="row"><div class="lab">.eyebrow · 12 caps</div><span class="eyebrow">Tue 2pm cutoff · Zone 3</span></div>
  <div class="row"><div class="lab">.tabular · prices</div><span class="tabular" style="font-weight:600">$148.00 · 12 cases · SKU 0421</span></div>
</div>
</body></html>
