<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--surface); font-family: var(--font-sans); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 8px; padding: 10px 18px; font-weight: 500; border: none; cursor: pointer; transition: background 150ms var(--ease-fluent); font-size: 14px; }
  .btn-primary { background: var(--brand-blue); color: white; }
  .btn-primary:hover { background: var(--brand-blue-dark); }
  .btn-success { background: var(--brand-green); color: white; }
  .btn-secondary { background: var(--bg-secondary); color: var(--ink-primary); }
  .btn-ghost { background: transparent; color: var(--ink-primary); }
  .btn-danger { background: var(--feedback-error); color: white; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-lg { padding: 14px 22px; font-size: 16px; }
  .lab { font-size: 11px; color: var(--ink-tertiary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; font-weight: 600; }
</style></head>
<body>
  <div class="lab">Variants</div>
  <div class="row" style="margin-bottom:18px">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-success">Place order</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-danger">Cancel order</button>
  </div>
  <div class="lab">Sizes</div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary">Medium</button>
    <button class="btn btn-primary btn-lg">Large</button>
  </div>
</body></html>
