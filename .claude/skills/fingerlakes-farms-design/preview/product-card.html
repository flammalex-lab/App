<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-secondary); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { background: white; border: 1px solid var(--border-hairline); border-radius: 12px; padding: 16px; transition: border-color 150ms var(--ease-fluent); }
  .card:hover { border-color: var(--border-hover); }
  .row { display: flex; gap: 12px; }
  .thumb { width: 64px; height: 64px; border-radius: 8px; background: var(--bg-secondary) center/cover no-repeat; flex-shrink: 0; }
  .meta { flex: 1; }
  .title { font-weight: 600; font-size: 14px; color: var(--ink-primary); }
  .sub { font-size: 13px; color: var(--ink-secondary); margin-top: 2px; }
  .price { font-weight: 700; font-size: 15px; margin-top: 8px; }
</style></head>
<body>
  <div class="card">
    <div class="row">
      <div class="thumb" style="background-image:url('../assets/photos/produce-1.jpg')"></div>
      <div class="meta">
        <div class="title">Heirloom tomato · case</div>
        <div class="sub">12 lb · Grasslands · Zone 3</div>
        <div class="price tabular">$32.00 <span style="font-weight:400;color:var(--ink-tertiary);font-size:12px">/ case</span></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="row">
      <div class="thumb" style="background-image:url('../assets/photos/chicken-1.jpg')"></div>
      <div class="meta">
        <div class="title">Pasture-raised eggs</div>
        <div class="sub">15 doz · Meadow Creek</div>
        <div class="price tabular">$78.00</div>
      </div>
    </div>
  </div>
</body></html>
