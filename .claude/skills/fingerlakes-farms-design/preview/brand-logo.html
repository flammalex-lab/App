<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); display: flex; gap: 24px; align-items: center; }
  img { display: block; }
  .pair { display: flex; align-items: center; gap: 12px; }
  .wm { font-family: var(--font-display); font-weight: 800; color: var(--brand-blue); letter-spacing: -0.025em; font-size: 22px; }
  .lab { font-size: 11px; color: var(--ink-tertiary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; font-weight: 600; font-family: var(--font-sans); }
  .col { display: flex; flex-direction: column; align-items: flex-start; }
</style></head>
<body>
  <div class="col">
    <div class="lab">Mark</div>
    <img src="../assets/flf-logo.png" width="92" height="92" alt="FLF mark"/>
  </div>
  <div class="col">
    <div class="lab">Mark + wordmark</div>
    <div class="pair">
      <img src="../assets/flf-logo.png" width="48" height="48" alt=""/>
      <span class="wm">Fingerlakes Farms</span>
    </div>
  </div>
  <div class="col">
    <div class="lab">Wordmark only</div>
    <span class="wm" style="font-size:28px">Fingerlakes Farms</span>
  </div>
</body></html>
