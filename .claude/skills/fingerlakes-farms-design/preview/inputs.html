<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 14px; font-weight: 500; color: var(--ink-primary); }
  .input { width: 100%; border-radius: 8px; border: 1px solid rgba(0,0,0,0.10); padding: 10px 12px; outline: none; font: inherit; font-size: 14px; transition: border-color 150ms var(--ease-fluent); box-sizing: border-box; }
  .input:focus { border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(23,99,181,0.20); }
  .hint { font-size: 12px; color: var(--ink-secondary); }
  .qty { display: inline-flex; align-items: center; gap: 6px; }
  .qty button { width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.10); background: white; cursor: pointer; font-size: 16px; }
  .qty input { width: 48px; height: 36px; text-align: center; font: inherit; font-weight: 600; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; }
</style></head>
<body>
  <div class="field">
    <label>Account name</label>
    <input class="input" value="Hopfields Restaurant" />
    <span class="hint">Shown on invoices and the QB export.</span>
  </div>
  <div class="field">
    <label>Phone (OTP)</label>
    <input class="input" placeholder="(607) 555-0182" />
    <span class="hint">We'll text a one-time code.</span>
  </div>
  <div class="field">
    <label>Quantity</label>
    <div class="qty"><button>−</button><input class="tabular" value="12"/><button>+</button></div>
    <span class="hint">Cases. Commits on blur or Enter.</span>
  </div>
  <div class="field">
    <label>Focused state</label>
    <input class="input" style="border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(23,99,181,0.20);" value="focused" />
  </div>
</body></html>
