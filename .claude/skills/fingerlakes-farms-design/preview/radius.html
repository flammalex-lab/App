<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); display: flex; gap: 24px; align-items: center; }
  .demo { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { background: var(--surface); border: 1px solid var(--border-hairline); width: 84px; height: 60px; }
  code { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-tertiary); }
  .name { font-size: 12px; color: var(--ink-primary); font-weight: 600; }
</style></head>
<body>
  <div class="demo"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><code>6px</code></div>
  <div class="demo"><div class="box" style="border-radius:8px"></div><div class="name">md · btn/input</div><code>8px</code></div>
  <div class="demo"><div class="box" style="border-radius:12px"></div><div class="name">xl · card</div><code>12px</code></div>
  <div class="demo"><div class="box" style="border-radius:16px"></div><div class="name">2xl · sheet</div><code>16px</code></div>
  <div class="demo"><div class="box" style="border-radius:9999px"></div><div class="name">full · badge</div><code>9999px</code></div>
</body></html>
