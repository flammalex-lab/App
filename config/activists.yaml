# Whitelist of activist investors with documented small/mid-cap track records.
# A 13D from any of these is a high-priority signal.
# Sources: 13D Monitor, Insightia, SEC filings (maintain and refine quarterly).
#
# `aum_tier`: small (<$500M), mid ($500M-$2B), large (>$2B)
# `cap_focus`: typical market-cap sweet spot for targets
# `style`: operational | balance-sheet | strategic-alternatives | governance | hybrid

activists:
  - name: Engaged Capital
    cik: "0001567063"
    aum_tier: mid
    cap_focus: micro-to-small
    style: operational
    notes: Glenn Welling. Strong small-cap operational record.

  - name: JANA Partners
    cik: "0001159159"
    aum_tier: large
